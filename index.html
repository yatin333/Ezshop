<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ezshop</title>

<style>

:root{
--primary:#6366f1;
--light:#f1f5f9;
}

body{
margin:0;
font-family:Segoe UI;
background:var(--light);
}

/* NAVBAR */

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:white;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.logo{
font-size:26px;
font-weight:bold;
}

.logo span{
color:var(--primary);
}

.cart{
background:var(--primary);
color:white;
padding:6px 12px;
border-radius:6px;
font-weight:bold;
}

/* HERO */

.hero{
text-align:center;
padding:50px;
background:linear-gradient(135deg,#eef2ff,#ffffff);
}

/* SHOP */

.shop{
padding:40px;
}

.title{
text-align:center;
font-size:28px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.product{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
transition:0.3s;
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
height:200px;
object-fit:cover;
}

.info{
padding:10px;
}

.price{
color:var(--primary);
font-weight:bold;
}

button{
background:var(--primary);
color:white;
border:none;
padding:8px 12px;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#4f46e5;
}

footer{
text-align:center;
padding:20px;
background:white;
margin-top:30px;
}

</style>
</head>

<body>


<nav>

<div class="logo">ez<span>shop</span></div>

<div class="cart">
Cart : <span id="cart-count">0</span>
</div>

</nav>



<section class="hero">

<h1>Shopping Made Easy</h1>
<p>Buy gadgets and electronics</p>

</section>



<section class="shop">

<h2 class="title">Trending Products</h2>

<div class="grid">


<!-- Headphone -->

<div class="product">

<img src="https://m.media-amazon.com/images/I/712wyKsNmML.jpg">

<div class="info">

<h3>Headphone</h3>
<p class="price">₹1299</p>

<button onclick="addToCart()">Add to Cart</button>

</div>
</div>



<!-- Smartphone -->

<div class="product">

<img src="https://imgcdn.stablediffusionweb.com/2024/10/15/2eac7182-4bef-47c2-9ea3-2d282aa1d85f.jpg">

<div class="info">

<h3>Smartphone</h3>
<p class="price">₹39999</p>

<button onclick="addToCart()">Add to Cart</button>

</div>
</div>



<!-- Keyboard -->

<div class="product">

<img src="https://tse4.mm.bing.net/th/id/OIP.SZwgX2tpRJuo5MnMQ6rr8wHaDv?pid=Api&P=0&h=180">

<div class="info">

<h3>Keyboard</h3>
<p class="price">₹12000</p>

<button onclick="addToCart()">Add to Cart</button>

</div>
</div>



<!-- Laptop -->

<div class="product">

<img src="https://tse3.mm.bing.net/th/id/OIP.7bsTJYW9vlGrfrWW37VhEwHaE6?pid=Api&P=0&h=180">

<div class="info">

<h3>Laptop</h3>
<p class="price">₹49999</p>

<button onclick="addToCart()">Add to Cart</button>

</div>
</div>


</div>

</section>



<footer>

© 2026 ezshop

</footer>



<script>

let cart = 0;

function addToCart(){

cart++;

document.getElementById("cart-count").innerText = cart;

}

</script>


</body>
</html>
